services:
  app:
    image: oven/bun:1.3-debian
    volumes:
      - ..:/workspace:cached
      - bun-cache:/home/bun/.bun
    command: sleep infinity
    ports:
      - "4100:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/portfolio_dev
      - USE_LOCAL_DB=true
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_dev
    ports:
      - "5501:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bun-cache:
