name: CI

on:
  pull_request:
    branches: [main]
  # Manual re-runs only — `pull_request: main` already gates merges.
  # Triggering on `push: main` would duplicate every merge's CI.
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same PR. Saves runner
# minutes when reviewers push edits quickly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Shared install + cache priming. Downstream jobs reuse the cache via the
  # same key, so each gets a warm `~/.bun/install/cache` without paying the
  # download cost again.
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Cache bun install
        id: bun-cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

  audit:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level=high

  quality:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile

      - name: Vitest
        run: bun run test

  build:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    env:
      NODE_ENV: production
      SKIP_DB_VALIDATION: 'true'
      # Sentry plugin no-ops cleanly without the auth token; production
      # source-map upload happens from the Vercel build, not from CI.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile

      - name: Cache Next.js incremental build
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Bust the cache when source files or deps change, but reuse it
          # across same-commit reruns and on dep-only changes.
          key: nextjs-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: bun run build
