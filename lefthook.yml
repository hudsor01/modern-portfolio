# Lefthook configuration
# Replaces Husky + lint-staged

pre-commit:
  parallel: true
  commands:
    lint-staged:
      run: bunx lint-staged
      stage_fixed: true  # Auto-stage files fixed by lint-staged

pre-push:
  commands:
    # Vitest suite runs in ~500ms — fast enough for pre-push.
    # Bypass with `git push --no-verify` if needed.
    tests:
      run: bunx vitest run --passWithNoTests
