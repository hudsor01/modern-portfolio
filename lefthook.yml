# Lefthook configuration

pre-commit:
  parallel: true
  commands:
    biome:
      # Biome's built-in --staged flag replaces lint-staged. Runs check + format
      # only on staged files; lefthook's stage_fixed re-stages anything Biome
      # rewrote.
      glob: 'src/**/*.{ts,tsx,js,jsx,json}'
      run: bunx biome check --staged --write --no-errors-on-unmatched
      stage_fixed: true

pre-push:
  commands:
    # Vitest suite runs in ~500ms — fast enough for pre-push.
    # Bypass with `git push --no-verify` if needed.
    tests:
      run: bunx vitest run --passWithNoTests
